<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Diagrama relacional do banco de dados Unsolved</title>
  <desc id="desc">Visão das dez tabelas do schema Unsolved, com suas chaves primárias, chaves estrangeiras e relacionamentos.</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17140e"/>
      <stop offset="0.55" stop-color="#211d13"/>
      <stop offset="1" stop-color="#12110d"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f3c17"/>
      <stop offset="1" stop-color="#2a2415"/>
    </linearGradient>
    <pattern id="grid" width="38" height="38" patternUnits="userSpaceOnUse">
      <path d="M38 0H0V38" fill="none" stroke="#f0d86d" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L8 4.5 0 9" fill="none" stroke="#b88a35" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .brand { font: 700 46px Georgia, serif; letter-spacing: 6px; fill: #f0d86d; }
      .eyebrow { font: 600 15px Arial, sans-serif; letter-spacing: 3px; fill: #b5cdda; }
      .meta { font: 600 14px Arial, sans-serif; letter-spacing: 1.4px; fill: #d8ccb1; }
      .link { fill: none; stroke: #8b6220; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .link-soft { fill: none; stroke: #b5cdda; stroke-opacity: .66; stroke-width: 2.5; stroke-linecap: round; stroke-dasharray: 8 10; marker-end: url(#arrow); }
      .relation-badge { fill: #17140e; stroke: #6a5427; stroke-width: 1; }
      .relation-text { font: 700 13px Arial, sans-serif; letter-spacing: 1px; fill: #f0d86d; }
      .node-shell { fill: #28241b; stroke: #4b4433; stroke-width: 1.5; }
      .node-kicker { font: 700 11px Arial, sans-serif; letter-spacing: 1.5px; fill: #b5cdda; }
      .table-name { font: 700 24px Consolas, monospace; fill: #f4ecd9; }
      .table-name-compact { font: 700 20px Consolas, monospace; fill: #f4ecd9; }
      .field { font: 600 14px Consolas, monospace; fill: #d6cdb9; }
      .field-compact { font: 600 13px Consolas, monospace; fill: #d6cdb9; }
      .pk { fill: #f0d86d; }
      .fk { fill: #b5cdda; }
      .core-title { font: 700 40px Consolas, monospace; letter-spacing: 1px; fill: #f8e78e; }
      .core-copy { font: 400 15px Arial, sans-serif; fill: #e5dcc8; }
      .junction { fill: #201d12; stroke: #b88a35; stroke-width: 1.5; }
      .junction-title { font: 700 17px Consolas, monospace; fill: #f0d86d; }
      .footer { font: italic 18px Georgia, serif; fill: #938976; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#background)"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>
  <circle cx="1400" cy="-30" r="390" fill="#8b6220" opacity="0.055"/>
  <circle cx="70" cy="1040" r="440" fill="#b5cdda" opacity="0.035"/>

  <!-- Identidade sem caixa ou fundo -->
  <image x="38" y="10" width="174" height="174" xlink:href="assets/unsolved-logo-transparente.png" preserveAspectRatio="xMidYMid meet"/>
  <text x="218" y="88" class="eyebrow">SISTEMA DE COLD CASES</text>
  <text x="214" y="139" class="brand">UNSOLVED</text>
  <rect x="1194" y="72" width="314" height="48" rx="24" fill="#28241b" stroke="#4b4433"/>
  <circle cx="1226" cy="96" r="6" fill="#f0d86d"/>
  <text x="1246" y="101" class="meta">MYSQL · REFERÊNCIAS PK/FK</text>
  <path d="M62 184H1538" stroke="#6a5427" stroke-opacity="0.55"/>

  <!-- Relacionamentos -->
  <path class="link-soft" d="M410 292C500 292 530 370 600 430"/>
  <path class="link-soft" d="M800 345V380"/>
  <path class="link-soft" d="M1190 292C1100 292 1070 370 1000 430"/>
  <path class="link" d="M650 610C600 640 560 655 510 670"/>
  <path class="link" d="M310 715C290 738 270 754 250 770"/>
  <path class="link" d="M730 610C700 668 648 719 600 770"/>
  <path class="link" d="M870 610C905 672 955 721 1000 770"/>
  <path class="link" d="M1000 500C1080 554 1132 675 1190 825"/>
  <path class="link-soft" d="M1350 575V735"/>

  <!-- Cardinalidades -->
  <g transform="translate(486 324)"><rect class="relation-badge" width="54" height="28" rx="14"/><text x="27" y="19" text-anchor="middle" class="relation-text">1:N</text></g>
  <g transform="translate(821 350)"><rect class="relation-badge" width="54" height="28" rx="14"/><text x="27" y="19" text-anchor="middle" class="relation-text">1:N</text></g>
  <g transform="translate(1060 324)"><rect class="relation-badge" width="54" height="28" rx="14"/><text x="27" y="19" text-anchor="middle" class="relation-text">1:N</text></g>
  <g transform="translate(560 650)"><rect class="relation-badge" width="54" height="28" rx="14"/><text x="27" y="19" text-anchor="middle" class="relation-text">1:N</text></g>
  <g transform="translate(914 650)"><rect class="relation-badge" width="54" height="28" rx="14"/><text x="27" y="19" text-anchor="middle" class="relation-text">1:N</text></g>
  <g transform="translate(1087 641)"><rect class="relation-badge" width="54" height="28" rx="14"/><text x="27" y="19" text-anchor="middle" class="relation-text">1:N</text></g>
  <g transform="translate(1370 638)"><rect class="relation-badge" width="54" height="28" rx="14"/><text x="27" y="19" text-anchor="middle" class="relation-text">1:N</text></g>

  <!-- Tabelas de contexto -->
  <g transform="translate(90 220)" filter="url(#soft-shadow)">
    <rect class="node-shell" width="320" height="145" rx="22"/>
    <rect width="8" height="145" rx="4" fill="#b5cdda"/>
    <circle cx="290" cy="27" r="7" fill="#b5cdda"/>
    <text x="30" y="34" class="node-kicker">CONTEXTO</text>
    <text x="30" y="73" class="table-name">cidades</text>
    <text x="30" y="113" class="field"><tspan class="pk">PK</tspan><tspan dx="14">id_cidade</tspan></text>
  </g>
  <g transform="translate(640 200)" filter="url(#soft-shadow)">
    <rect class="node-shell" width="320" height="145" rx="22"/>
    <rect width="320" height="7" rx="3.5" fill="#b5cdda"/>
    <circle cx="290" cy="27" r="7" fill="#b5cdda"/>
    <text x="30" y="39" class="node-kicker">FLUXO</text>
    <text x="30" y="75" class="table-name-compact">status_investigacao</text>
    <text x="30" y="115" class="field"><tspan class="pk">PK</tspan><tspan dx="14">id_status</tspan></text>
  </g>
  <g transform="translate(1190 220)" filter="url(#soft-shadow)">
    <rect class="node-shell" width="320" height="145" rx="22"/>
    <rect x="312" width="8" height="145" rx="4" fill="#b5cdda"/>
    <circle cx="290" cy="27" r="7" fill="#b5cdda"/>
    <text x="30" y="34" class="node-kicker">RESPONSÁVEL</text>
    <text x="30" y="73" class="table-name">detetives</text>
    <text x="30" y="113" class="field"><tspan class="pk">PK</tspan><tspan dx="14">id_detetive</tspan></text>
  </g>

  <!-- Tabela central -->
  <g transform="translate(600 380)" filter="url(#shadow)">
    <rect width="400" height="230" rx="32" fill="url(#core)" stroke="#f0d86d" stroke-width="2.5"/>
    <circle cx="68" cy="77" r="31" fill="none" stroke="#f0d86d" stroke-width="6"/>
    <circle cx="68" cy="77" r="18" fill="#b5cdda" opacity="0.16"/>
    <path d="M90 99L116 125" stroke="#b88a35" stroke-width="10" stroke-linecap="round"/>
    <text x="145" y="42" class="node-kicker">NÚCLEO DA INVESTIGAÇÃO</text>
    <text x="145" y="86" class="core-title">casos</text>
    <text x="145" y="112" class="core-copy">referencia contexto e responsável</text>
    <text x="34" y="155" class="field"><tspan class="pk">PK</tspan><tspan dx="14">id_caso</tspan></text>
    <text x="205" y="155" class="field"><tspan class="fk">FK</tspan><tspan dx="14">id_cidade</tspan></text>
    <text x="34" y="188" class="field"><tspan class="fk">FK</tspan><tspan dx="14">id_status</tspan></text>
    <text x="205" y="188" class="field-compact"><tspan class="fk">FK</tspan><tspan dx="10">id_detetive_responsavel</tspan></text>
  </g>

  <!-- Tabela associativa -->
  <g transform="translate(240 625)" filter="url(#soft-shadow)">
    <rect class="junction" width="270" height="90" rx="19"/>
    <text x="135" y="28" text-anchor="middle" class="junction-title">caso_suspeito</text>
    <text x="24" y="55" class="field-compact"><tspan class="pk">PK</tspan><tspan class="fk">/FK</tspan><tspan dx="8">id_caso</tspan></text>
    <text x="24" y="77" class="field-compact"><tspan class="pk">PK</tspan><tspan class="fk">/FK</tspan><tspan dx="8">id_suspeito</tspan></text>
  </g>

  <!-- Pessoas -->
  <g transform="translate(90 770)" filter="url(#soft-shadow)">
    <rect class="node-shell" width="320" height="155" rx="22"/>
    <rect width="320" height="7" rx="3.5" fill="#d8ccb1"/>
    <circle cx="290" cy="28" r="7" fill="#d8ccb1"/>
    <text x="30" y="40" class="node-kicker">PESSOAS · N:N</text>
    <text x="30" y="77" class="table-name">suspeitos</text>
    <text x="30" y="119" class="field"><tspan class="pk">PK</tspan><tspan dx="14">id_suspeito</tspan></text>
  </g>
  <g transform="translate(440 770)" filter="url(#soft-shadow)">
    <rect class="node-shell" width="320" height="155" rx="22"/>
    <rect width="320" height="7" rx="3.5" fill="#d8ccb1"/>
    <circle cx="290" cy="28" r="7" fill="#d8ccb1"/>
    <text x="30" y="40" class="node-kicker">PESSOAS · 1:N</text>
    <text x="30" y="77" class="table-name">vitimas</text>
    <text x="30" y="112" class="field"><tspan class="pk">PK</tspan><tspan dx="14">id_vitima</tspan></text>
    <text x="30" y="138" class="field"><tspan class="fk">FK</tspan><tspan dx="14">id_caso</tspan></text>
  </g>
  <g transform="translate(840 770)" filter="url(#soft-shadow)">
    <rect class="node-shell" width="320" height="155" rx="22"/>
    <rect width="320" height="7" rx="3.5" fill="#d8ccb1"/>
    <circle cx="290" cy="28" r="7" fill="#d8ccb1"/>
    <text x="30" y="40" class="node-kicker">PESSOAS · 1:N</text>
    <text x="30" y="77" class="table-name">testemunhas</text>
    <text x="30" y="112" class="field"><tspan class="pk">PK</tspan><tspan dx="14">id_testemunha</tspan></text>
    <text x="30" y="138" class="field"><tspan class="fk">FK</tspan><tspan dx="14">id_caso</tspan></text>
  </g>

  <!-- Evidências -->
  <g transform="translate(1190 430)" filter="url(#soft-shadow)">
    <rect class="node-shell" width="320" height="145" rx="22"/>
    <rect x="312" width="8" height="145" rx="4" fill="#c48b34"/>
    <circle cx="290" cy="27" r="7" fill="#c48b34"/>
    <text x="30" y="34" class="node-kicker">CLASSIFICAÇÃO</text>
    <text x="30" y="73" class="table-name-compact">tipos_evidencia</text>
    <text x="30" y="113" class="field"><tspan class="pk">PK</tspan><tspan dx="14">id_tipo_evidencia</tspan></text>
  </g>
  <g transform="translate(1190 735)" filter="url(#soft-shadow)">
    <rect class="node-shell" width="320" height="190" rx="22"/>
    <rect width="320" height="7" rx="3.5" fill="#c48b34"/>
    <circle cx="290" cy="28" r="7" fill="#c48b34"/>
    <text x="30" y="40" class="node-kicker">PROVAS · 1:N</text>
    <text x="30" y="77" class="table-name">evidencias</text>
    <text x="30" y="112" class="field"><tspan class="pk">PK</tspan><tspan dx="14">id_evidencia</tspan></text>
    <text x="30" y="140" class="field"><tspan class="fk">FK</tspan><tspan dx="14">id_tipo_evidencia</tspan></text>
    <text x="30" y="168" class="field"><tspan class="fk">FK</tspan><tspan dx="14">id_caso</tspan></text>
  </g>

  <text x="800" y="972" text-anchor="middle" class="footer">PK identifica a tabela · FK cria a referência · caso_suspeito resolve o relacionamento N:N</text>
</svg>
